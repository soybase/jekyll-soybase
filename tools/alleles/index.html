<script type="module">
  const uri = "https://graphql.lis.ncgr.org/graphql";

  async function graphqlQuery(uri, query, variables = {}, abortSignal) {
    const response = await fetch(uri, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      signal: abortSignal,
      body: JSON.stringify({ query, variables }),
    });

    if (!response.ok) {
      throw new Error(`GraphQL request failed: ${response.status}`);
    }

    const payload = await response.json();
    if (payload.errors && payload.errors.length > 0) {
      throw new Error(payload.errors[0].message || "GraphQL query failed");
    }

    return payload;
  }

  async function locationSearchFunction(identifier, abortSignal) {
    if (typeof identifier === "string") {
      identifier = identifier.trim();
    }

    const query = `
      query Results($identifier: String) {
        genes(identifier: $identifier) {
          results {
            locations {
              chromosome { identifier }
              start
              end
            }
          }
        }
      }
    `;

    const response = await graphqlQuery(uri, query, { identifier }, abortSignal);
    const result = response.data?.genes?.results?.[0];
    if (!result) throw new Error("Feature not found");

    const loc = result.locations?.[0];
    if (!loc) throw new Error("Feature location not found");

    return {
      chromosome: loc.chromosome.identifier,
      start: loc.start,
      end: loc.end,
    };
  }

  async function strainSearchFunction({ collection, fileName }, abortSignal) {
    const vcfUrl = `https://data.legumeinfo.org/Glycine/max/diversity/${collection}/${fileName}`;
    const doubleEncoded = encodeURIComponent(encodeURIComponent(vcfUrl));
    const url = `https://dev.lis.ncgr.org:50043/vcf/samples/${doubleEncoded}`;

    const response = await fetch(url, { signal: abortSignal });
    if (!response.ok) throw new Error("Failed to fetch strains");

    const data = await response.json();
    return (data.samples || []).map((sample) => ({
      identifier: sample.identifier || sample,
    }));
  }

  async function variantSearchFunction(
    { collection, fileName, chromosome, start, end, strains, encoding },
    abortSignal
  ) {
    const vcfUrl = `https://data.legumeinfo.org/Glycine/max/diversity/${collection}/${fileName}`;
    const doubleEncodedUrl = encodeURIComponent(encodeURIComponent(vcfUrl));
    const apiBase = "https://dev.lis.ncgr.org:50043/vcf/alleles";
    const path = `${chromosome}:${start}-${end}/${doubleEncodedUrl}`;
    const url = new URL(`${apiBase}/${path}`);

    url.searchParams.set("encoding", encoding || "hap");
    if (strains && strains.length > 0) {
      url.searchParams.set("samples", strains.join(","));
    }

    const response = await fetch(url.toString(), { signal: abortSignal });
    if (!response.ok) throw new Error("Failed to fetch variants");

    return response.json();
  }

  const alleleSearchElement = document.getElementById("allele-search");
  alleleSearchElement.preSelectedCollection = "Wm82.gnm4.div.Song_Hyten_2015";
  alleleSearchElement.locationSearchFunction = locationSearchFunction;
  alleleSearchElement.strainSearchFunction = strainSearchFunction;
  alleleSearchElement.variantSearchFunction = variantSearchFunction;
</script>

layout: full-width
title: Gene Function Search
web_components: true
---
<!-- the custom gene search element -->
<lis-gene-function-search-element id="gene-function-search" geneIdentifierExample="Glyma01g37810, E9, Dt1 FT" traitsExample="flowering, maturity, height" publicationExample="10.1111/jipb.13070 or 33458938" authorExample="Watanabe"></lis-gene-function-search-element>

<lis-modal-element modalId="modal">
  <lis-linkout-element id="linkouts"></lis-linkout-element>
</lis-modal-element>

  <script type="module">

    import {
      getGeneFunctionFormDataFunction,
      getGeneFunctions,
      geneFunctionSearchLinkoutsFunction,
    } from "lis-graphql";

    const geneFunctionSearchElement = document.getElementById('gene-function-search');
    geneFunctionSearchElement.formDataFunction = getGeneFunctionFormDataFunction;
    geneFunctionSearchElement.searchFunction = getGeneFunctions;
    geneFunctionSearchElement.linkoutFunction = geneFunctionSearchLinkoutsFunction;
    geneFunctionSearchElement.linkoutColumns = {
      geneSymbols: 'symbol',
      geneModelFullName: 'gene',
    };

  </script>
